<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLOTH</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="stage">
      <pre id="console"></pre>
      <!-- Side panel: shown when a runnable block opens a server portal. -->
      <aside id="portal">
        <header id="portal-bar">
          <a id="portal-url" href="#" target="_blank" rel="noopener"></a>
          <button id="portal-close" title="Close portal">✕</button>
        </header>
        <iframe id="portal-frame" src="about:blank"
          sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>
      </aside>
    </div>
    <!-- Hidden: opened only when SLOTH's Upload menu item asks for a file. -->
    <input id="file-input" type="file" accept=".md,.markdown,text/markdown" multiple hidden />
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
